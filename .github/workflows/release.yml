name: Release

# Publishes @vorionsys/aurais-core to npm with a Sigstore/SLSA provenance
# attestation via tokenless OIDC trusted publishing. Ring-3 of the ecosystem
# conformance ladder flagged this package as published WITHOUT provenance —
# this workflow closes that gap on the next tagged release (vX.Y.Z).
#
# Prereq: configure aurais-core as a trusted publisher for @vorionsys/aurais-core
# on npmjs.com (Settings -> Publishing access -> GitHub Actions), so no NPM_TOKEN
# is needed and provenance is attached automatically.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # required for npm provenance (tokenless OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - name: Update npm (trusted publishing requires npm >= 11.5.1)
        run: npm install -g npm@latest
      - name: Install
        run: npm ci
      - name: Build (if present)
        run: npm run build --if-present
      - name: Test (if present)
        run: npm test --if-present
      - name: Publish (tokenless OIDC, provenance)
        run: npm publish --provenance --access public
