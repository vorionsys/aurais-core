name: Release

# Tag-triggered npm publish for @vorionsys/aurais-core via OIDC trusted
# publishing — no long-lived NPM_TOKEN.
#
# Trigger: push a tag matching `v*` (e.g. `v0.2.0`). The version published is
#          whatever package.json declares — keep the tag and package.json in
#          sync. After a successful publish a GitHub Release is created with
#          notes auto-generated from PRs merged since the previous tag.
#
# One-time setup (npmjs.com side, by the package owner — currently highdragon):
#   npmjs.com/package/@vorionsys/aurais-core/access
#     -> Trusted Publisher -> GitHub Actions
#        Organization or user: voriongit
#        Repository:           aurais-core
#        Workflow filename:    release.yml   (filename only, not a path)
#        Environment:          (leave blank — this job sets none)
#   It also needs npm CLI >= 11.5.1 (the upgrade step below) and the
#   `id-token: write` permission. No secrets required.
#
# Provenance: `--provenance` is intentionally NOT set. It requires a PUBLIC
#   source repo, and aurais-core is currently private (publishing with
#   provenance from a private repo fails with `E422 ... visibility: private`).
#   When this repo is made public, add `--provenance` to the publish command.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 22 + npm registry
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # OIDC trusted publishing needs npm >= 11.5.1; Node 22 ships npm 10.x,
      # which silently ignores OIDC and falls back to a token. Upgrade so OIDC
      # actually engages.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # Idempotent: skip if this exact version is already on npm, so re-running
      # a tag (or pushing a tag whose version was already published) won't fail
      # with E409.
      - name: Publish to npm (OIDC trusted publishing)
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "Already published: $name@$version — skipping."
            exit 0
          fi
          # Add --provenance here once this repo is public (see header note).
          npm publish --access public

  # After npm publish succeeds, cut a GitHub Release for the tag. Separate job
  # so `contents: write` stays off the publish job (which only needs id-token).
  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create the Release
    steps:
      - uses: actions/checkout@v6

      # Idempotent: a re-run of an existing tag won't fail. Tags with a semver
      # pre-release suffix (e.g. v0.3.0-rc.1) are marked pre-release.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists — skipping."
            exit 0
          fi
          flags=""
          case "$tag" in *-*) flags="--prerelease" ;; esac
          gh release create "$tag" --title "$tag" --generate-notes $flags
